name: Automated Dividend Fetch

on:
  schedule:
    # Berjalan setiap Senin-Jumat jam 17:05 WIB (10:05 UTC)
    # Market IHSG tutup jam 16:00, kita beri jeda 1 jam agar data yfinance stabil.
    - cron: '5 10 * * 1-5'
  workflow_dispatch: # Tombol rahasia untuk jalankan manual kapan saja

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install yfinance pandas numpy

      - name: Run scraping script
        run: python fetch_data.py

      - name: Commit and push if data changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add public/data/*.json
          git commit -m "Auto-update dividend data: $(date)" || echo "No changes to commit"
          git push